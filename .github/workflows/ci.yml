name: Build & Push Auth Service

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: tqnhu4/order-service

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t $IMAGE_NAME:${{ github.sha }} .

    - name: Push Image
      run: docker push $IMAGE_NAME:${{ github.sha }}

    # 🔥 UPDATE GITOPS REPO
    - name: Update GitOps repo
      run: |
        git clone https://github.com/tqnhu4/argocd-order-service.git
        cd gitops-platform

        sudo snap install yq

        yq -i '.image.tag = "${{ github.sha }}"' environments/dev/values/order-values.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Update order image to ${{ github.sha }}"
        git push