name: Build & Push Auth Service

on:
  push:
    branches: ["dev"]

env:
  IMAGE_NAME: nhutq/order-service
  #GITOPS_REPO: https://github.com/tqnhu4/gitops-platform.git
  GITOPS_REPO: git@github.com:tqnhu4/gitops-platform.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

    - name: Push Image
      run: |
        docker push $IMAGE_NAME:${{ github.sha }}
        docker push $IMAGE_NAME:latest



    # 🔥 UPDATE GITOPS REPO
    - name: Update GitOps repo
      run: |
        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/tqnhu4/gitops-platform.git
        cd gitops-platform

        sudo snap install yq

        yq -i '.image.tag = "${{ github.sha }}"' environments/dev/values/order-values.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Update order image to ${{ github.sha }}"
        git push